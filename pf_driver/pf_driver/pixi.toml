[workspace]
preview = ["pixi-build"]
channels = [
  "https://prefix.dev/pixi-experimental-backends",
  "https://prefix.dev/conda-forge",
]
platforms = ["linux-64", "linux-aarch64"]

[package]
name = "ros-kilted-pf-driver"

[package.build.source]
path = "pf_lidar_ros2_driver/src/pf_driver"

[package.build.backend]
name = "pixi-build-ros"
version = "*"

# backend = { name = "pixi-build-ros", version = "*" }


[[package.build.config.extra-package-mappings]]
curlpp-dev = { conda = ["curlpp"] }
